<script>

/* ===============================
 CONTEXT
=============================== */
function getContext(){
  const triggers = {};
  document.querySelectorAll("[data-trigger]").forEach(cb=>{
    triggers[cb.dataset.trigger] = cb.checked;
  });
  return triggers;
}

/* ===============================
 SCORING LOGIC
=============================== */

function scoreBroadband(ctx){
  const results = [];

  if(ctx.streaming){
    results.push({
      name: "Fibre Broadband",
      why: ["smooth streaming", "no buffering"]
    });
  }

  if(ctx.gaming){
    results.push({
      name: "Full Fibre Pro",
      why: ["low latency", "stable connection"]
    });
  }

  if(!results.length){
    results.push({
      name: "Standard Broadband",
      why: ["general everyday use"]
    });
  }

  return results;
}

function scoreTV(ctx){
  const results = [];

  if(ctx.sport){
    results.push({
      name: "Sports Package",
      why: ["live coverage", "premium channels"]
    });
  }

  if(ctx.kids){
    results.push({
      name: "Kids Package",
      why: ["safe content", "family friendly"]
    });
  }

  return results;
}

/* ===============================
 RENDERING
=============================== */

function renderList(node, list, emptyMsg){
  node.innerHTML = "";

  if(!list.length){
    node.innerHTML = `<div class="empty">${emptyMsg}</div>`;
    return;
  }

  list.forEach((r, i)=>{
    const rank =
      i === 0 ? "Best match" :
      i === 1 ? "Strong alternative" :
      "Backup";

    node.insertAdjacentHTML("beforeend", `
      <div class="result">
        <div class="title">${r.name}</div>
        <span class="badge">${rank}</span>
        <div class="meta">${r.why.join(" • ")}</div>
      </div>
    `);
  });
}

/* ===============================
 SCRIPT BUILDER
=============================== */

function buildFinalScript(bb, tv){
  const lines = [];

  if(bb[0]){
    lines.push(`Broadband — ${bb[0].name}: ${bb[0].why.join(", ")}.`);
  }

  if(tv[0]){
    lines.push(`TV — ${tv[0].name}: ${tv[0].why.join(", ")}.`);
  }

  return `Based on what you've told me:\n\n• ${lines.join("\n• ")}`;
}

/* ===============================
 EVENTS
=============================== */

document.getElementById("btnEvaluate").addEventListener("click", ()=>{

  const ctx = getContext();

  const bb = scoreBroadband(ctx);
  const tv = scoreTV(ctx);

  renderList(
    document.getElementById("bbResults"),
    bb,
    "No broadband recommendations yet."
  );

  renderList(
    document.getElementById("tvResults"),
    tv,
    "No TV recommendations yet."
  );

  document.getElementById("finalScript").value =
    buildFinalScript(bb, tv);

});

document.getElementById("btnReset").addEventListener("click", ()=>{
  document.querySelectorAll("[data-trigger]").forEach(cb=>cb.checked=false);

  document.getElementById("bbResults").innerHTML = "";
  document.getElementById("tvResults").innerHTML = "";
  document.getElementById("finalScript").value = "";
});

</script>

</body>
</html>
